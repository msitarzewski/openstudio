<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="OpenStudio - Decentralized broadcast studio for podcasters">
  <meta name="author" content="OpenStudio Contributors">
  <title>OpenStudio - Web Studio</title>

  <!-- Styles (fonts self-hosted via @font-face in studio.css) -->
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/studio.css">

  <!-- Scripts -->
  <script type="module" src="js/main.js"></script>
</head>
<body>
  <!-- Signal Bar (Header) -->
  <header>
    <h1>OPEN<span class="wordmark-accent">STUDIO</span></h1>
    <small class="tagline">talk hard.</small>
    <div class="header-right">
      <div id="status">Disconnected</div>
      <span id="session-info" class="session-info"></span>
    </div>
  </header>

  <!-- Main content area -->
  <main>
    <!-- Stage: Participants -->
    <section id="participants" class="stage">
      <!-- Participant cards will be added dynamically when users join -->
    </section>

    <!-- Program Bus / Signal Output -->
    <section id="program-bus-section" class="signal-output">
      <div class="meter-label">SIGNAL OUTPUT</div>
      <div class="meter-container">
        <canvas id="waveform-display" class="waveform-canvas" height="48"></canvas>
        <canvas id="volume-meter" width="600" height="24"></canvas>
      </div>
    </section>

    <!-- Transport Controls -->
    <section id="controls" class="transport">
      <button id="start-session" class="btn-broadcast">Start Broadcast</button>
      <button id="toggle-mute" class="btn-ghost" disabled>Mute</button>
      <button id="start-recording" class="btn-ghost btn-record" disabled>Record</button>
      <button id="stop-recording" class="btn-ghost" disabled style="display: none;">Stop Recording</button>
      <button id="start-streaming" class="btn-ghost btn-stream" disabled>Stream</button>
      <button id="stop-streaming" class="btn-ghost" disabled style="display: none;">Stop Streaming</button>
      <button id="end-session" class="btn-end" disabled>End Broadcast</button>
    </section>

    <!-- Deck: Recording Panel -->
    <section id="recording-section" class="deck-panel">
      <div class="deck-header" data-deck="recording">
        <div class="deck-summary">
          <div class="recording-indicator" id="recording-indicator"></div>
          <span class="deck-label">REC</span>
          <span id="recording-timer" class="recording-timer">00:00:00</span>
        </div>
        <button class="deck-toggle" aria-label="Toggle recording panel">&#9660;</button>
      </div>
      <div class="deck-body" id="recording-deck-body">
        <div class="recording-controls">
          <button id="download-recordings" disabled style="display: none;">Download All</button>
        </div>
        <div id="recording-tracks" class="recording-tracks" style="display: none;">
          <!-- Track download list appears here after recording stops -->
        </div>

        <!-- Export options (shown after recording stops) -->
        <div id="export-panel" class="export-panel" style="display: none;">
          <div class="export-title">Export As</div>
          <div class="export-mode-toggle">
            <button id="export-raw" class="export-mode-btn active" data-mode="raw">Raw</button>
            <button id="export-clean" class="export-mode-btn" data-mode="clean">Clean</button>
          </div>

          <!-- Clean options (collapsible) -->
          <div id="clean-options" class="clean-options-collapsible" style="display: none;">
            <div class="clean-option-row">
              <label for="filler-sensitivity">Filler Sensitivity</label>
              <select id="filler-sensitivity">
                <option value="low">Low</option>
                <option value="medium" selected>Medium</option>
                <option value="high">High</option>
              </select>
            </div>
            <div class="clean-option-row">
              <label for="silence-threshold">Silence Threshold</label>
              <select id="silence-threshold">
                <option value="-40">-40 dB</option>
                <option value="-50" selected>-50 dB</option>
                <option value="-60">-60 dB</option>
              </select>
            </div>
            <div class="clean-option-row">
              <label for="output-format">Output Format</label>
              <select id="output-format">
                <option value="webm">WebM (Opus)</option>
                <option value="wav" selected>WAV</option>
                <option value="mp3">MP3 (Podcast)</option>
              </select>
            </div>
          </div>

          <!-- Export action -->
          <div class="export-actions">
            <button id="export-btn" class="btn-export" disabled>Export</button>
            <div id="export-status" class="export-status" style="display: none;"></div>
            <button id="download-cleaned" class="btn-download-cleaned" style="display: none;">Download</button>
          </div>

          <!-- Transcription & Show Notes -->
          <div class="export-divider">— or —</div>

          <!-- Transcribe button (per track) -->
          <div id="transcribe-section" class="transcribe-section" style="display: none;">
            <div class="transcribe-title">Post-Production</div>
            <button id="transcribe-btn" class="btn-transcribe">Transcribe Recording</button>
            <div id="transcribe-status" class="export-status" style="display: none;"></div>

            <!-- Show Notes panel (shown after transcription) -->
            <div id="show-notes-panel" class="show-notes-panel" style="display: none;">
              <div class="show-notes-title">Generated Show Notes</div>

              <!-- Episode title (editable) -->
              <div class="show-notes-field">
                <label>Episode Title</label>
                <input type="text" id="episode-title-input" placeholder="Episode title..." />
              </div>

              <!-- Summary -->
              <div class="show-notes-field">
                <label>Summary</label>
                <textarea id="episode-summary" class="show-notes-textarea" readonly></textarea>
              </div>

              <!-- Segment markers -->
              <div class="show-notes-field">
                <label>Segments</label>
                <div id="segment-list" class="segment-list"></div>
              </div>

              <!-- Actions -->
              <div class="show-notes-actions">
                <button id="copy-show-notes" class="btn-secondary">Copy to Clipboard</button>
                <button id="download-show-notes" class="btn-secondary">Download .md</button>
                <span id="show-notes-status" class="export-status" style="display: none;"></span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Deck: Audio Input Selector -->
    <section id="input-section" class="deck-panel">
      <div class="deck-header" data-deck="input">
        <div class="deck-summary">
          <span class="deck-label">INPUT</span>
        </div>
        <button class="deck-toggle" aria-label="Toggle input panel">&#9654;</button>
      </div>
      <div class="deck-body" id="input-deck-body">
        <div class="streaming-config">
          <label for="mic-select">Microphone:</label>
          <select id="mic-select">
            <option value="" data-loading>Scanning devices...</option>
          </select>
        </div>
      </div>
    </section>

    <!-- Deck: Streaming Panel -->
    <section id="streaming-section" class="deck-panel">
      <div class="deck-header" data-deck="streaming">
        <div class="deck-summary">
          <span class="deck-label">TRANSMIT</span>
          <span id="streaming-status" class="streaming-status">Not Streaming</span>
        </div>
        <button class="deck-toggle" aria-label="Toggle streaming panel">&#9660;</button>
      </div>
      <div class="deck-body" id="streaming-deck-body">
        <div class="streaming-controls">
          <div class="streaming-config">
            <label for="bitrate-select">Bitrate:</label>
            <select id="bitrate-select">
              <option value="48000">48 kbps</option>
              <option value="96000">96 kbps</option>
              <option value="128000" selected>128 kbps</option>
              <option value="192000">192 kbps</option>
            </select>
          </div>
        </div>
        <div id="streaming-info" class="streaming-info">
          <div class="streaming-url">Stream URL: <a href="/stream/live.opus" target="_blank" id="stream-url">/stream/live.opus</a></div>
        </div>
      </div>
    </section>

    <!-- Capability Modal: shown when an AI feature is gated by missing tooling -->
    <dialog id="capability-modal" class="capability-modal" aria-labelledby="capability-modal-title">
      <div class="capability-modal-content">
        <header class="capability-modal-header">
          <h2 id="capability-modal-title">Feature Requires Setup</h2>
          <button class="capability-modal-close" aria-label="Close" data-close-modal>&times;</button>
        </header>
        <div class="capability-modal-body" id="capability-modal-body">
          <!-- Populated by JS -->
        </div>
        <footer class="capability-modal-footer">
          <a href="https://github.com/msitarzewski/openstudio#optional-ai-tooling" target="_blank" rel="noopener" class="capability-modal-docs">Full setup docs →</a>
          <button class="capability-modal-ok" data-close-modal>Got it</button>
        </footer>
      </div>
    </dialog>
  </main>
</body>
</html>
