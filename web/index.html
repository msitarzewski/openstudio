<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="OpenStudio - Decentralized broadcast studio for podcasters">
  <meta name="author" content="OpenStudio Contributors">
  <title>OpenStudio - Web Studio</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/studio.css">

  <!-- Scripts -->
  <script type="module" src="js/main.js"></script>
</head>
<body>
  <!-- Signal Bar (Header) -->
  <header>
    <h1>OPEN<span class="wordmark-accent">STUDIO</span></h1>
    <small class="tagline">talk hard.</small>
    <div class="header-center">
      <div id="status">Disconnected</div>
    </div>
    <div class="header-right">
      <span id="session-info" class="session-info"></span>
    </div>
  </header>

  <!-- Main content area -->
  <main>
    <!-- Stage: Participants -->
    <section id="participants" class="stage">
      <!-- Participant cards will be added dynamically when users join -->
    </section>

    <!-- Program Bus / Signal Output -->
    <section id="program-bus-section" class="signal-output">
      <div class="meter-label">SIGNAL OUTPUT</div>
      <div class="meter-container">
        <canvas id="waveform-display" class="waveform-canvas" height="48"></canvas>
        <canvas id="volume-meter" width="600" height="24"></canvas>
      </div>
    </section>

    <!-- Transport Controls -->
    <section id="controls" class="transport">
      <button id="start-session" class="btn-broadcast">Start Broadcast</button>
      <button id="toggle-mute" class="btn-ghost" disabled>Mute</button>
      <button id="start-recording" class="btn-ghost btn-record" disabled>Record</button>
      <button id="stop-recording" class="btn-ghost" disabled style="display: none;">Stop Recording</button>
      <button id="start-streaming" class="btn-ghost btn-stream" disabled>Stream</button>
      <button id="stop-streaming" class="btn-ghost" disabled style="display: none;">Stop Streaming</button>
      <button id="end-session" class="btn-end" disabled>End Broadcast</button>
    </section>

    <!-- Deck: Recording Panel -->
    <section id="recording-section" class="deck-panel">
      <div class="deck-header" data-deck="recording">
        <div class="deck-summary">
          <div class="recording-indicator" id="recording-indicator"></div>
          <span class="deck-label">REC</span>
          <span id="recording-timer" class="recording-timer">00:00:00</span>
        </div>
        <button class="deck-toggle" aria-label="Toggle recording panel">&#9660;</button>
      </div>
      <div class="deck-body" id="recording-deck-body">
        <div class="recording-controls">
          <button id="download-recordings" disabled style="display: none;">Download All</button>
        </div>
        <div id="recording-tracks" class="recording-tracks" style="display: none;">
          <!-- Track download list appears here after recording stops -->
        </div>
      </div>
    </section>

    <!-- Deck: Streaming Panel -->
    <section id="streaming-section" class="deck-panel">
      <div class="deck-header" data-deck="streaming">
        <div class="deck-summary">
          <span class="deck-label">TRANSMIT</span>
          <span id="streaming-status" class="streaming-status">Not Streaming</span>
        </div>
        <button class="deck-toggle" aria-label="Toggle streaming panel">&#9660;</button>
      </div>
      <div class="deck-body" id="streaming-deck-body">
        <div class="streaming-controls">
          <div class="streaming-config">
            <label for="bitrate-select">Bitrate:</label>
            <select id="bitrate-select">
              <option value="48000">48 kbps</option>
              <option value="96000">96 kbps</option>
              <option value="128000" selected>128 kbps</option>
              <option value="192000">192 kbps</option>
            </select>
          </div>
        </div>
        <div id="streaming-info" class="streaming-info">
          <div class="streaming-url">Stream URL: <a href="/stream/live.opus" target="_blank" id="stream-url">/stream/live.opus</a></div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
