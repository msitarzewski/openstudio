name: Feature Request
description: Suggest a new feature for OpenStudio
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: Thanks for suggesting a feature! Please describe what you'd like.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions you've thought about?
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Audio / WebRTC
        - UI / UX
        - Server / Signaling
        - Streaming / Icecast
        - Recording
        - Deployment
        - Documentation
        - Other
