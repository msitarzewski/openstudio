name: Bug Report
description: Report a bug in OpenStudio
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting a bug! Please fill out the sections below.
  - type: input
    id: version
    attributes:
      label: OpenStudio Version
      description: What version are you running?
      placeholder: "0.2.0"
    validations:
      required: true
  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome
        - Firefox
        - Safari
        - Brave
        - Edge
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Start server with `npm start`
        2. Open browser to localhost:6736
        3. Click 'Start Session'
        4. See error in console
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Console output / logs
      description: Any relevant console output (browser or server)
      render: shell
